[project]
name = "phileas"
version = "0.0.0"
description = "Local-first AI companion memory infrastructure"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "mcp[cli]",
    "sentence-transformers>=5.3.0",
]

[project.optional-dependencies]
embeddings = ["sentence-transformers"]

[dependency-groups]
dev = ["ruff"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/phileas"]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I"]
